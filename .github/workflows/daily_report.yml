name: Daily MLB Sharp Report

on:
  schedule:
    - cron: '0 16 * * *'   # 11:00 AM CT (16:00 UTC)
    - cron: '30 19 * * *'  # 2:30 PM CT (19:30 UTC)
    - cron: '0 22 * * *'   # 5:00 PM CT (22:00 UTC)
  workflow_dispatch:        # allow manual trigger from GitHub UI

jobs:
  run-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Log yesterday's results
        run: python log_results.py || true

      - name: Run MLBSharp
        env:
          OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
        run: python run.py

      - name: Push dashboard data, projections cache, and results
        run: |
          git config user.name "MLBSharp Bot"
          git config user.email "mlbsharp@users.noreply.github.com"
          git add dashboard_data.json projections_cache.json fg_cache.json results.csv
          git diff --staged --quiet || git commit -m "Auto update $(date +'%Y-%m-%d %H:%M')"
          git push
